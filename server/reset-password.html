<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Jits Journal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e3a8a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 {
      color: #1e3a8a;
      font-size: 24px;
      font-weight: 700;
    }
    .logo p {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1e3a8a; }
    button {
      width: 100%;
      padding: 14px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1e40af; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .message.error { background: #fee2e2; color: #dc2626; display: block; }
    .message.success { background: #dcfce7; color: #16a34a; display: block; }
    .invalid { text-align: center; padding: 20px 0; }
    .invalid p { color: #6b7280; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Jits Journal</h1>
      <p>Brazilian Jiu-Jitsu Training Companion</p>
    </div>

    <div id="message" class="message"></div>

    <div id="form-container">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" minlength="8">

      <label for="confirm">Confirm New Password</label>
      <input type="password" id="confirm" placeholder="Re-enter your new password">

      <button id="submit-btn" onclick="resetPassword()">Set New Password</button>
    </div>

    <div id="invalid-container" class="invalid" style="display:none;">
      <p>This password reset link is invalid or has expired.</p>
      <p>Please request a new one from the app.</p>
    </div>

    <div id="success-container" style="display:none; text-align:center; padding:20px 0;">
      <p style="color:#16a34a; font-weight:600; font-size:18px;">Password Updated!</p>
      <p style="color:#6b7280; margin-top:8px;">You can now log in to Jits Journal with your new password.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://umotigprfosrrjwpxlnp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtb3RpZ3ByZm9zcnJqd3B4bG5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjAzMzQ4NDAsImV4cCI6MjAzNTkxMDg0MH0.d5yLGYOSzwvf0a2mR8XMIJo9mxgOAXZqSW8E6QdO7QU';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    async function init() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const type = params.get('type');

      if (!accessToken || type !== 'recovery') {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('invalid-container').style.display = 'block';
        return;
      }

      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: params.get('refresh_token') || '',
      });

      if (error) {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('invalid-container').style.display = 'block';
      }
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        showMessage(error.message || 'Failed to update password. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      } else {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('message').style.display = 'none';
        document.getElementById('success-container').style.display = 'block';
      }
    }

    init();
  </script>
</body>
</html>
